name: Build Android Debug APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 21 Environment
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Setup Gradle Build Engine
      uses: gradle/actions/setup-gradle@v4

    - name: Compile and Intercept Errors
      run: |
        echo "Starting Android Compilation Process..."
        gradle assembleDebug --stacktrace > compilation_log.txt 2>&1 || EXIT_CODE=$?
        
        if [ ! -z "$EXIT_CODE" ] && [ "$EXIT_CODE" -ne 0 ]; then
          echo "===================================================="
          echo "❌ CRITICAL COMPILATION ERROR FOUND INSIDE APP CODE"
          echo "===================================================="
          echo "MEHMOOD - COPY AND PASTE ALL THE TEXT BELOW THIS LINE:"
          echo "----------------------------------------------------"
          
          # This forces the raw compiler error to print directly into the console box
          grep -E "e: |error:|FAILED" compilation_log.txt || tail -n 40 compilation_log.txt
          
          echo "----------------------------------------------------"
          echo "===================================================="
          exit $EXIT_CODE
        fi

    - name: Upload Finished APK Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: nclex-prep-app
        path: app/build/outputs/apk/debug/app-debug.apk
