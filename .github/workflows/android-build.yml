name: Build Android Debug APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 21 Environment
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21' # Upgraded to handle modern 2026 Android builds

    - name: Setup Gradle Build Engine
      uses: gradle/actions/setup-gradle@v4

    - name: Compile and Build Debug APK Natively
      run: gradle assembleDebug --stacktrace # Appended stacktrace for deep diagnostic insight

    - name: Upload Finished APK Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: nclex-prep-app
        path: app/build/outputs/apk/debug/app-debug.apk
